name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository content
      uses: actions/checkout@v4
    - name: Get tags
      run: git fetch --tags --prune --unshallow
    - name: Install SFML
      run: sudo apt-get install libsfml-dev
    - name: autoincrement version
      run: ./autoincrement.sh
    - name: make
      run: make
    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: voronoi_bin
        path: all
        if-no-files-found: error
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository content
      uses: actions/checkout@v4
    - name: Install SFML
      run: sudo apt-get install libsfml-dev
    - name: doctest
      run: make test
    - name: run tests
      run: ./test
  
